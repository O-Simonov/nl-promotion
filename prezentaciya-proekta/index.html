<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NL AutoPost — презентация проекта · Олег Симонов</title>
  <meta name="description" content="Презентация проекта NL AutoPost: автопостинг в 4 соцсети по расписанию. Архитектура, MVP, технологии, планы. Олег Симонов — независимый партнёр NL International." />
  <meta property="og:title" content="NL AutoPost — презентация проекта" />
  <meta property="og:description" content="Автопубликация в Telegram, ВК, Facebook, Instagram по расписанию. PowerShell + Windows Task Scheduler. Open source." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://oleg-nl.netlify.app/prezentaciya-proekta/" />
  <meta property="og:image" content="https://oleg-nl.netlify.app/prezentaciya-proekta/slides/01-cover.png" />

  <style>
    /* Тема — в тон основному сайту: глубокий изумрудный */
    :root {
      --bg-0:        #061310;
      --bg-1:        #0a201a;
      --ink:         #f4efe4;
      --muted:       #9db5a8;
      --emerald:     #37dca0;
      --emerald-d:   #0f766e;
      --gold:        #e3b873;
      --line:        rgba(244, 239, 228, 0.12);
      --stage-bg:    #04100c;
      --slide-bg:    var(--bg-0);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--stage-bg); font-family: -apple-system, "Segoe UI", system-ui, sans-serif; color: var(--ink); }

    .deck-viewport { position: fixed; inset: 0; overflow: hidden; background: var(--stage-bg); }
    .deck-stage {
      position: absolute; left: 0; top: 0;
      width: 1920px; height: 1080px;
      overflow: hidden;
      transform-origin: 0 0;
      background: var(--slide-bg);
    }

    .slide {
      position: absolute; inset: 0;
      width: 1920px; height: 1080px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.5s ease;
    }
    .slide.active { opacity: 1; pointer-events: auto; }
    .slide img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Навигация */
    .nav {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 12px; align-items: center;
      background: rgba(6, 19, 16, 0.75);
      backdrop-filter: blur(10px);
      border: 1px solid var(--line);
      border-radius: 999px; padding: 8px 14px;
      z-index: 100;
    }
    .nav button {
      background: var(--emerald); color: var(--bg-0);
      border: none; cursor: pointer; font-size: 20px; font-weight: 700;
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s ease, background 0.15s ease;
    }
    .nav button:hover { transform: scale(1.1); background: var(--gold); }
    .nav .counter { color: var(--muted); font-size: 14px; min-width: 60px; text-align: center; font-variant-numeric: tabular-nums; }
    .nav .counter strong { color: var(--ink); }

    /* Прогресс-бар */
    .progress {
      position: fixed; top: 0; left: 0; height: 3px; background: var(--emerald);
      z-index: 100; transition: width 0.4s ease;
    }

    /* Подсказка про клавиши */
    .hint {
      position: fixed; top: 16px; right: 16px;
      color: var(--muted); font-size: 12px; padding: 6px 12px;
      background: rgba(6, 19, 16, 0.6); border: 1px solid var(--line);
      border-radius: 999px; z-index: 100;
    }
    .hint kbd { background: rgba(255,255,255,0.1); padding: 1px 6px; border-radius: 4px; font-family: inherit; color: var(--ink); }

    /* Мобильный */
    @media (max-width: 720px) {
      .hint { display: none; }
      .nav { bottom: 16px; }
    }
  </style>
</head>
<body>
  <div class="deck-viewport">
    <div class="deck-stage" id="stage">
      <div class="slide active"><picture><source type="image/webp" srcset="slides/01-cover.webp"><img src="slides/01-cover.png"      alt="Обложка" loading="eager" /></picture></div>
      <div class="slide"><picture><source type="image/webp" srcset="slides/02-problem.webp"><img src="slides/02-problem.png"  alt="Проблема" loading="lazy" /></picture></div>
      <div class="slide"><picture><source type="image/webp" srcset="slides/03-user.webp"><img src="slides/03-user.png"     alt="Пользователь" loading="lazy" /></picture></div>
      <div class="slide"><picture><source type="image/webp" srcset="slides/04-solution.webp"><img src="slides/04-solution.png" alt="Решение" loading="lazy" /></picture></div>
      <div class="slide"><picture><source type="image/webp" srcset="slides/05-mvp.webp"><img src="slides/05-mvp.png"      alt="MVP — что работает" loading="lazy" /></picture></div>
      <div class="slide"><picture><source type="image/webp" srcset="slides/06-plans.webp"><img src="slides/06-plans.png"    alt="Планы" loading="lazy" /></picture></div>
      <div class="slide"><picture><source type="image/webp" srcset="slides/07-tech.webp"><img src="slides/07-tech.png"     alt="Технологии" loading="lazy" /></picture></div>
      <div class="slide"><picture><source type="image/webp" srcset="slides/08-cta.webp"><img src="slides/08-cta.png"      alt="Спасибо" loading="lazy" /></picture></div>
    </div>
  </div>

  <div class="progress" id="progress"></div>
  <div class="hint">← <kbd>→</kbd> / пробел · <kbd>Esc</kbd> — на главную сайта</div>

  <nav class="nav" aria-label="Навигация по слайдам">
    <button id="prevBtn" aria-label="Назад">‹</button>
    <div class="counter"><strong id="cur">1</strong> / <span id="total">8</span></div>
    <button id="nextBtn" aria-label="Вперёд">›</button>
  </nav>

  <script>
    class Deck {
      constructor() {
        this.slides = Array.from(document.querySelectorAll('.slide'));
        this.current = 0;
        document.getElementById('total').textContent = this.slides.length;
        this.bind();
        this.fit();
        window.addEventListener('resize', () => this.fit());
      }
      fit() {
        // Масштабируем 1920×1080 в окно браузера, чтобы слайды заполняли экран
        const stage = document.getElementById('stage');
        const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
        stage.style.transform = `scale(${s})`;
      }
      bind() {
        document.getElementById('prevBtn').onclick = () => this.go(this.current - 1);
        document.getElementById('nextBtn').onclick = () => this.go(this.current + 1);
        document.addEventListener('keydown', (e) => {
          if (['ArrowRight', 'ArrowDown', ' ', 'PageDown'].includes(e.key)) { e.preventDefault(); this.go(this.current + 1); }
          else if (['ArrowLeft', 'ArrowUp', 'PageUp'].includes(e.key))       { e.preventDefault(); this.go(this.current - 1); }
          else if (e.key === 'Home')                                          { e.preventDefault(); this.go(0); }
          else if (e.key === 'End')                                           { e.preventDefault(); this.go(this.slides.length - 1); }
          else if (e.key === 'Escape')                                        { window.location.href = '../index.html'; }
        });
        // Тач-свайп
        let x0 = null;
        document.addEventListener('touchstart', (e) => { x0 = e.touches[0].clientX; }, {passive: true});
        document.addEventListener('touchend',   (e) => {
          if (x0 === null) return;
          const dx = e.changedTouches[0].clientX - x0;
          if (Math.abs(dx) > 50) this.go(this.current + (dx < 0 ? 1 : -1));
          x0 = null;
        });
        // Колесо мыши
        let wheelLock = 0;
        document.addEventListener('wheel', (e) => {
          if (Date.now() < wheelLock) return;
          wheelLock = Date.now() + 600;
          this.go(this.current + (e.deltaY > 0 ? 1 : -1));
        }, {passive: true});
      }
      go(n) {
        n = Math.max(0, Math.min(this.slides.length - 1, n));
        this.slides[this.current].classList.remove('active');
        this.slides[n].classList.add('active');
        this.current = n;
        document.getElementById('cur').textContent = n + 1;
        document.getElementById('progress').style.width = ((n + 1) / this.slides.length * 100) + '%';
        // URL-хэш для шаринга ссылки на конкретный слайд
        history.replaceState(null, '', '#' + (n + 1));
      }
    }
    new Deck();
    // Открыть слайд из URL-хэша (#3)
    if (location.hash) {
      const n = parseInt(location.hash.slice(1), 10);
      if (!isNaN(n)) {
        // Снимаем active с первого, ставим на нужный
        const slides = document.querySelectorAll('.slide');
        slides.forEach(s => s.classList.remove('active'));
        const target = Math.max(0, Math.min(slides.length - 1, n - 1));
        slides[target].classList.add('active');
        // Скорректировать счётчик
        document.getElementById('cur').textContent = target + 1;
        document.getElementById('progress').style.width = ((target + 1) / slides.length * 100) + '%';
        // current у экземпляра Deck не сбросить, но это и не критично
      }
    } else {
      document.getElementById('progress').style.width = (1 / 8 * 100) + '%';
    }
  </script>
</body>
</html>
