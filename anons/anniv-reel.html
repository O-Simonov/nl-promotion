<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1080px;height:1920px;overflow:hidden;font-family:'Manrope',sans-serif;background:#04100c;}
  #stage{position:relative;width:1080px;height:1920px;overflow:hidden;color:#f4efe4;
    background:
      radial-gradient(760px 620px at 80% 6%, rgba(227,184,115,0.22), transparent 60%),
      radial-gradient(720px 640px at 14% 100%, rgba(55,220,160,0.16), transparent 58%),
      linear-gradient(165deg,#0a2419 0%,#061511 55%,#04100c 100%);}
  .grain{position:absolute;inset:0;opacity:0.05;mix-blend-mode:overlay;pointer-events:none;z-index:5;}
  .layer{position:absolute;left:0;right:0;text-align:center;z-index:3;will-change:transform,opacity;}
  .conf{position:absolute;z-index:2;border-radius:50%;will-change:transform,opacity;}

  #kicker{top:230px;font-size:36px;font-weight:800;letter-spacing:10px;text-transform:uppercase;color:#37dca0;}
  #avatarWrap{top:300px;display:flex;justify-content:center;}
  #avatar{width:180px;height:180px;border-radius:50%;padding:5px;
    background:linear-gradient(135deg,#0f766e,#37dca0 55%,#e3b873);box-shadow:0 18px 50px rgba(227,184,115,0.32);}
  #avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:5px solid #061511;display:block;}
  #num{top:560px;font-family:'Playfair Display',serif;font-weight:900;font-size:640px;line-height:0.8;
    background:linear-gradient(165deg,#f4d999,#e3b873 45%,#c9974f);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 18px 50px rgba(227,184,115,0.32));}
  #let{top:1130px;font-family:'Playfair Display',serif;font-style:italic;font-weight:700;font-size:128px;color:#f4efe4;}
  #sub{top:1330px;font-size:52px;font-weight:800;}
  #sub b{color:#37dca0;}
  #tag{top:1440px;font-size:35px;font-weight:500;color:#9db5a8;}
  #link{top:1560px;display:flex;justify-content:center;}
  #link span{display:inline-flex;align-items:center;gap:16px;padding:24px 54px;border-radius:999px;
    background:linear-gradient(135deg,#e3b873,#c9974f);color:#2a1c06;font-size:46px;font-weight:800;
    box-shadow:0 18px 44px rgba(227,184,115,0.34);will-change:transform;}
  #foot{top:1740px;font-size:34px;font-weight:700;color:rgba(157,181,168,0.92);}
  #foot b{color:#e3b873;}
</style>
</head>
<body>
  <div id="stage">
    <svg class="grain" width="1080" height="1920"><filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#g)"/></svg>
    <div id="confetti"></div>
    <div class="layer" id="kicker">NL International</div>
    <div class="layer" id="avatarWrap"><div id="avatar"><img src="../foto.jpg" alt="" /></div></div>
    <div class="layer" id="num">25</div>
    <div class="layer" id="let">лет вместе</div>
    <div class="layer" id="sub">С <b>юбилеем</b>, любимая компания!</div>
    <div class="layer" id="tag">Юбилейный форум NL25 · 13 июня</div>
    <div class="layer" id="link"><span>🔗 oleg-nl.netlify.app</span></div>
    <div class="layer" id="foot">Олег Симонов · <b>@Simka1969_nl</b></div>
  </div>

<script>
  const TOTAL = 12; // секунд

  const clamp=(x,a=0,b=1)=>Math.max(a,Math.min(b,x));
  const seg=(T,a,b)=>clamp((T-a)/(b-a));
  const easeOut=x=>1-Math.pow(1-x,3);
  const backOut=x=>{const c=1.70158,c3=c+1;return 1+c3*Math.pow(x-1,3)+c*Math.pow(x-1,2);};
  const lerp=(a,b,p)=>a+(b-a)*p;
  function set(id,op,ty){const e=document.getElementById(id);e.style.opacity=op;e.style.transform='translateY('+ty+'px)';}

  // ---- конфетти ----
  const colors=['#e3b873','#37dca0','#f4d999','#c9974f'];
  const pieces=[];
  const cont=document.getElementById('confetti');
  for(let i=0;i<26;i++){
    const el=document.createElement('span');
    el.className='conf';
    const sz=8+Math.random()*16;
    const ring=Math.random()<0.3;
    el.style.width=sz+'px';el.style.height=sz+'px';
    if(ring){el.style.background='transparent';el.style.border='2px solid '+colors[i%colors.length];}
    else{el.style.background=colors[i%colors.length];}
    cont.appendChild(el);
    pieces.push({el,x:Math.random()*1080,y:-100+Math.random()*2000,
      vy:120+Math.random()*200, sway:30+Math.random()*60, phase:Math.random()*6.28, delay:Math.random()*0.3});
  }

  // ---- один кадр по t (0..1); тайминги заданы в СЕКУНДАХ от TOTAL ----
  function renderFrame(t){
    const T = t*TOTAL;
    let p;
    p=easeOut(seg(T,0.1,0.9));   set('kicker',p,lerp(-30,0,p));
    // avatar
    p=seg(T,0.4,1.5);
    document.getElementById('avatarWrap').style.opacity=clamp(p*1.4);
    document.getElementById('avatar').style.transform='scale('+lerp(0.5,1,backOut(p))+')';
    // 25
    p=seg(T,0.9,2.5);
    const numEl=document.getElementById('num');
    numEl.style.opacity=clamp(p*1.5);
    numEl.style.transform='scale('+lerp(0.2,1,backOut(p))+')';
    // лет вместе
    p=easeOut(seg(T,2.4,3.3));  set('let',p,lerp(40,0,p));
    // sub
    p=easeOut(seg(T,3.3,4.2));  set('sub',p,lerp(34,0,p));
    // tag
    p=easeOut(seg(T,4.1,5.0));  set('tag',p,lerp(28,0,p));
    // ссылка (поп + лёгкое «дыхание» на удержании)
    p=seg(T,5.0,6.0);
    const link=document.getElementById('link');
    link.style.opacity=clamp(p*1.5);
    const linkInner=link.firstElementChild;
    if(T<=6.0){ linkInner.style.transform='scale('+lerp(0.7,1,backOut(p))+')'; }
    else { linkInner.style.transform='scale('+(1+0.035*Math.sin((T-6.0)*2.3))+')'; }
    // foot
    p=easeOut(seg(T,5.9,6.8));   set('foot',p,lerp(24,0,p));
    // конфетти
    for(const pc of pieces){
      const local=Math.max(0,T-pc.delay*TOTAL);
      const y=((pc.y+local*pc.vy)%2100+2100)%2100-100;
      const x=pc.x+Math.sin(pc.phase+local*1.5)*pc.sway;
      pc.el.style.transform='translate('+x+'px,'+y+'px) rotate('+(local*110+pc.phase*40)+'deg)';
      pc.el.style.opacity=clamp(seg(T,0.1,0.5))*((y>-50&&y<1980)?0.9:0);
    }
  }
  window.renderFrame=renderFrame;

  // ---- авто-проигрывание, если не ?capture=1 ----
  const capture=new URLSearchParams(location.search).get('capture');
  if(!capture){
    const DUR=TOTAL*1000, HOLD=900;
    let start=null;
    function loop(ts){
      if(start===null)start=ts;
      const m=(ts-start)%(DUR+HOLD);
      renderFrame(Math.min(1,m/DUR));
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  } else { renderFrame(0); }
</script>
</body>
</html>
